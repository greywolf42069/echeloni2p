[toolchain]
anchor_version = "0.30.1"

[features]
resolution = true
skip-lint = false

# Program IDs below are placeholders generated deterministically so the source
# compiles before the devnet keypair exists. `anchor keys sync` rewrites both
# these entries AND the `declare_id!` in lib.rs from the real keypair under
# target/deploy/ at first build. Do NOT treat this address as canonical.
[programs.localnet]
echelon_subscription = "E3TuFfRKQDmt3uwTcXaUFVd2Zrqa1wYzUG9KykmWQsoj"

[programs.devnet]
echelon_subscription = "E3TuFfRKQDmt3uwTcXaUFVd2Zrqa1wYzUG9KykmWQsoj"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
