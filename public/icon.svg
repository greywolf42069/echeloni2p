<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Echelon">
  <defs>
    <linearGradient id="echelon-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="0.55" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <!-- background -->
  <rect width="512" height="512" rx="112" fill="#0f172a"/>
  <!-- echelon (stepped) formation: three offset bars, descending,
       evoking a staggered relay chain / layered privacy hops -->
  <g fill="url(#echelon-grad)">
    <rect x="96"  y="150" width="220" height="48" rx="24"/>
    <rect x="146" y="232" width="220" height="48" rx="24"/>
    <rect x="196" y="314" width="220" height="48" rx="24"/>
  </g>
  <!-- node dots marking the relay endpoints -->
  <g fill="#5eead4">
    <circle cx="120" cy="174" r="14"/>
    <circle cx="392" cy="338" r="14"/>
  </g>
</svg>
